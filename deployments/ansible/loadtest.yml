---
# deployments/ansible/loadtest.yml
# Run k6 scripts from the k6 runner without using manual SSH commands.
#
# Usage:
#   ansible-playbook -i inventories/terraform_inventory.py loadtest.yml
#   ansible-playbook -i inventories/terraform_inventory.py loadtest.yml -e loadtest_script=run-status.sh
#   ansible-playbook -i inventories/terraform_inventory.py loadtest.yml -e loadtest_script=run-spike.sh

- name: Run k6 load test
  hosts: k6_runners
  gather_facts: false

  vars:
    loadtest_script: run-mixed.sh
    allowed_loadtest_scripts:
      - run-mixed.sh
      - run-optimized.sh
      - run-spike.sh
      - run-status.sh

  tasks:
    - name: Reject invalid k6 script
      ansible.builtin.fail:
        msg: "Invalid loadtest_script '{{ loadtest_script }}'. Use one of: {{ allowed_loadtest_scripts | join(', ') }}"
      when: loadtest_script not in allowed_loadtest_scripts

    - name: Stop any previous k6 run before starting a new load test
      ansible.builtin.shell: |
        pkill -TERM -f '[k]6 run' || true
        sleep 2
        pkill -KILL -f '[k]6 run' || true
      changed_when: false
      when: loadtest_script != "run-status.sh"

    - name: Wait for previous k6 process to exit
      ansible.builtin.command: sleep 2
      changed_when: false
      when: loadtest_script != "run-status.sh"

    - name: Run selected k6 script
      ansible.builtin.command:
        argv:
          - ssh
          - -T
          - -i
          - "{{ ansible_ssh_private_key_file }}"
          - -o
          - StrictHostKeyChecking=no
          - -o
          - UserKnownHostsFile=/dev/null
          - -o
          - LogLevel=ERROR
          - "{{ ansible_user }}@{{ ansible_host }}"
          - "NO_COLOR=1 K6_NO_COLOR=1 TERM=dumb /home/ubuntu/{{ loadtest_script }}"
      delegate_to: localhost
      register: loadtest_result
      changed_when: loadtest_script != "run-status.sh"

    - name: Print k6 summary
      ansible.builtin.debug:
        msg:
          - "Load test finished successfully."
          - "{{ loadtest_result.stdout_lines | select('search', '^\\s*http_req_failed') | list | last | default('http_req_failed: n/a') | regex_replace('\\x1b\\[[0-9;]*[A-Za-z]', '') }}"
          - "{{ loadtest_result.stdout_lines | select('search', '^\\s*http_reqs') | list | last | default('http_reqs: n/a') | regex_replace('\\x1b\\[[0-9;]*[A-Za-z]', '') }}"
          - "{{ loadtest_result.stdout_lines | select('search', '^\\s*iterations') | list | last | default('iterations: n/a') | regex_replace('\\x1b\\[[0-9;]*[A-Za-z]', '') }}"
          - "{{ loadtest_result.stdout_lines | select('search', '^\\s*read_latency') | list | last | default('read_latency: n/a') | regex_replace('\\x1b\\[[0-9;]*[A-Za-z]', '') }}"
          - "{{ loadtest_result.stdout_lines | select('search', '^\\s*write_latency') | list | last | default('write_latency: n/a') | regex_replace('\\x1b\\[[0-9;]*[A-Za-z]', '') }}"
          - "{{ loadtest_result.stdout_lines | select('search', '^running \\(') | list | last | default('duration: n/a') | regex_replace('\\x1b\\[[0-9;]*[A-Za-z]', '') }}"
