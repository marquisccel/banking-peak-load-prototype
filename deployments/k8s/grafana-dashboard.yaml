apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
  namespace: banking
  labels:
    grafana_dashboard: "1"
data:
  grafana-dashboard.json: |
    {
      "__inputs": [],
      "__requires": [],
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "title": "Total Throughput (TPS)",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 100 },
                  { "color": "green", "value": 250 }
                ]
              },
              "mappings": [],
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center"
          },
          "targets": [
            {
              "expr": "sum(rate(banking_api_requests_total{url!=\"/metrics\"}[5m]))",
              "legendFormat": "TPS",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "P95 Latency",
          "type": "gauge",
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "min": 0,
              "max": 5,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1.5 },
                  { "color": "red", "value": 2 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "showThresholdLabels": true,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(banking_api_request_duration_seconds_bucket{url!=\"/metrics\"}[5m])) by (le))",
              "legendFormat": "P95",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Global Error Rate",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.05 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center"
          },
          "targets": [
            {
              "expr": "(sum(rate(banking_api_requests_total{code=~\"4..|5..\"}[5m])) or vector(0))/sum(rate(banking_api_requests_total[5m]))",
              "legendFormat": "Error Rate",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Uptime / Availability",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.99 },
                  { "color": "green", "value": 0.999 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          },
          "targets": [
            {
              "expr": "avg_over_time(up{job=\"banking-app\"}[5m])",
              "legendFormat": "banking-app",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "Request Rate by HTTP Code",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10, "spanNulls": false },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true }
          },
          "targets": [
            {
              "expr": "sum(rate(banking_api_requests_total{url!=\"/metrics\"}[5m])) by (code)",
              "legendFormat": "HTTP {{ code }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "Request Rate by Endpoint",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10, "spanNulls": false },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true }
          },
          "targets": [
            {
              "expr": "sum(rate(banking_api_requests_total{url!=\"/metrics\"}[5m])) by (url)",
              "legendFormat": "{{ url }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "title": "Average Latency by Endpoint",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10, "spanNulls": false },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true }
          },
          "targets": [
            {
              "expr": "(sum(rate(banking_api_request_duration_seconds_sum{url!=\"/metrics\"}[5m])) by (url) / clamp_min(sum(rate(banking_api_request_duration_seconds_count{url!=\"/metrics\"}[5m])) by (url), 0.001)) * 1000",
              "legendFormat": "{{ url }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "P95 Latency by Endpoint",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10, "spanNulls": false },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(banking_api_request_duration_seconds_bucket{url!=\"/metrics\"}[5m])) by (le, url))",
              "legendFormat": "{{ url }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 9,
          "title": "Dependency Health",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 19 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "min": 0,
              "max": 1,
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 15, "spanNulls": false },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "green", "value": 1 } ] }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true }
          },
          "targets": [
            {
              "expr": "dependency_up",
              "legendFormat": "{{ dependency }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 10,
          "title": "Application Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 19 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10, "spanNulls": false },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true }
          },
          "targets": [
            {
              "expr": "app_memory_usage_bytes",
              "legendFormat": "Memory Used",
              "refId": "A"
            },
            {
              "expr": "app_memory_limit_bytes",
              "legendFormat": "Memory Limit",
              "refId": "B"
            }
          ]
        },
        {
          "id": 11,
          "title": "CPU & Memory Utilization",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 16, "x": 0, "y": 26 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10, "spanNulls": false },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "yellow", "value": 0.7 }, { "color": "red", "value": 0.9 } ] }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true }
          },
          "targets": [
            {
              "expr": "app_cpu_utilization_ratio",
              "legendFormat": "CPU: API",
              "refId": "A"
            },
            {
              "expr": "app_memory_utilization_ratio",
              "legendFormat": "MEM: API",
              "refId": "B"
            }
          ]
        },
        {
          "id": 12,
          "title": "Resource Utilization (Bar)",
          "type": "bargauge",
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 26 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "yellow", "value": 0.7 }, { "color": "red", "value": 0.9 } ] },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "showUnfilled": true
          },
          "targets": [
            {
              "expr": "app_cpu_utilization_ratio",
              "legendFormat": "CPU: API",
              "refId": "A"
            },
            {
              "expr": "app_memory_utilization_ratio",
              "legendFormat": "MEM: API",
              "refId": "B"
            }
          ]
        },
        {
          "id": 13,
          "title": "Prometheus Scrape Requests",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 24, "x": 0, "y": 33 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10, "spanNulls": false },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true }
          },
          "targets": [
            {
              "expr": "sum(rate(promhttp_metric_handler_requests_total[5m])) by (code)",
              "legendFormat": "Scrape {{ code }}",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "5s",
      "schemaVersion": 38,
      "tags": ["banking", "peak-load", "monitoring", "fixed"],
      "templating": { "list": [] },
      "time": { "from": "now-30m", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Banking Peak Load Monitor - Fixed",
      "uid": "banking-peak-load-fixed",
      "version": 4
    }
